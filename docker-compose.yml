# docker-compose.yml
name: dynamite-core

services:

  postgres:
    image: postgres:16
    command: ["postgres", "-c", "flush_data=off"]
    container_name: dynamite_postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dynamite_net

  migrator:
    build:
      context: .
      dockerfile: src/Dynamite.Migrator/Dockerfile
    container_name: dynamite_migrator
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Ho_Chi_Minh
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    networks:
      - dynamite_net

  bot:
    build:
      context: .
      dockerfile: src/Dynamite.Bot/Dockerfile
    container_name: dynamite_bot
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Ho_Chi_Minh
      Discord__Token: ${DISCORD_TOKEN}
      Discord__TestGuildId: ${DISCORD_TEST_GUILD_ID}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    volumes:
      - bot_logs:/app/logs
    networks:
      - dynamite_net

  api:
    build:
      context: .
      dockerfile: src/Dynamite.API/Dockerfile
    container_name: dynamite_api
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Ho_Chi_Minh
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Discord__ClientId: ${DISCORD_CLIENT_ID}
      Discord__ClientSecret: ${DISCORD_CLIENT_SECRET}
      Discord__RedirectUri: ${DISCORD_REDIRECT_URI}
      Discord__Token: ${DISCORD_TOKEN}
      Discord__BotToken: ${DISCORD_TOKEN}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-dynamite-api}
      Jwt__Audience: ${JWT_AUDIENCE:-dynamite-dashboard}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_1:-http://localhost:5173}
    ports:
      - "${API_PORT:-5000}:5000"
    networks:
      - dynamite_net

  dashboard:
    build:
      context: src/dynamite-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
        VITE_DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:5173/auth/callback}
    container_name: dynamite_dashboard
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    networks:
      - dynamite_net

volumes:
  postgres_data:
  bot_logs:

networks:
  dynamite_net:
    driver: bridge
